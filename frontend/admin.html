<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка · Трекинг онлайна игр</title>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
<link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
<meta name="theme-color" content="#0a0d10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d10; --panel:#11161b; --panel-2:#161c22; --line:#232b32;
    --text:#d9e2e8; --text-dim:#7c8a94;
    --up:#3ddc84; --down:#ff7a59; --signal:#4dd8e8; --amber:#ffb454; --violet:#b48cff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  a{ color:var(--signal); text-decoration:none; }
  button{ font-family:inherit; }

  header{ padding:22px 32px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line); }
  header img{ width:32px; height:32px; border-radius:8px; }
  header .t{ font-weight:800; font-size:18px; }
  header .t small{ display:block; font-weight:500; font-size:12px; color:var(--text-dim); }
  header .right{ margin-left:auto; display:flex; gap:12px; align-items:center; }

  .wrap{ max-width:920px; margin:0 auto; padding:28px 22px 80px; }

  .btn-primary{ background:var(--signal); color:#06222a; border:none; font-weight:700; font-size:13px; padding:10px 16px; border-radius:9px; cursor:pointer; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-ghost{ background:var(--panel); border:1px solid var(--line); color:var(--text); font-weight:600; font-size:13px; padding:9px 14px; border-radius:9px; cursor:pointer; }
  .btn-danger{ background:transparent; border:1px solid rgba(255,122,89,.4); color:var(--down); font-weight:600; font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer; }
  .btn-danger:hover{ background:rgba(255,122,89,.1); }

  input{ width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:9px; padding:11px 13px; color:var(--text); font-size:14px; outline:none; }
  input:focus{ border-color:#33414b; }
  label{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.6px; display:block; margin-bottom:7px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:20px; }
  .card h2{ font-size:14px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:14px; }

  .msg{ font-size:12.5px; margin-top:10px; min-height:16px; }
  .msg.error{ color:var(--down); } .msg.success{ color:var(--up); }
  .hint{ font-size:11.5px; color:var(--text-dim); line-height:1.6; margin-top:8px; }

  /* login */
  #login{ max-width:380px; margin:12vh auto 0; }

  /* games table */
  .toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar input{ flex:1; min-width:160px; }
  .row{ display:grid; grid-template-columns:34px 1fr 90px 120px 92px; align-items:center; gap:10px; padding:11px 8px; border-bottom:1px solid var(--line); }
  .row:last-child{ border-bottom:none; }
  .thumb{ width:30px; height:30px; border-radius:6px; border:1px solid var(--line); overflow:hidden; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-dim); }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .nm{ font-weight:600; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .src{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
  .src.steam{ color:var(--signal); } .src.roblox{ color:var(--amber); } .src.twitch{ color:var(--violet); }
  .num{ font-family:'JetBrains Mono',monospace; font-size:13px; text-align:right; }
  .tag{ font-size:10px; padding:2px 7px; border-radius:6px; border:1px solid var(--line); color:var(--text-dim); }
  .tag.user{ color:var(--signal); border-color:rgba(77,216,232,.3); }
  .empty{ padding:40px; text-align:center; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
  <header>
    <img src="/icons/android-chrome-192x192.png" alt="logo">
    <div class="t">Админ-панель<small>Трекинг онлайна игр</small></div>
    <div class="right">
      <a href="/">← На сайт</a>
      <button class="btn-ghost" id="logoutBtn" style="display:none;">Выйти</button>
    </div>
  </header>

  <!-- ВХОД -->
  <div class="wrap" id="loginWrap">
    <div class="card" id="login">
      <h2>Вход</h2>
      <label>Пароль администратора</label>
      <input type="password" id="pwInput" placeholder="ADMIN_PASSWORD" autocomplete="current-password">
      <div class="msg" id="loginMsg"></div>
      <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:14px;">Войти</button>
      <div class="hint">Пароль задаётся переменной окружения <span class="mono">ADMIN_PASSWORD</span> на сервере (Railway → Variables).</div>
    </div>
  </div>

  <!-- ПАНЕЛЬ -->
  <div class="wrap" id="panel" style="display:none;">
    <div class="card">
      <h2>Добавить игру</h2>
      <label>Ссылка на игру (Steam или Roblox)</label>
      <input type="text" id="addInput" placeholder="store.steampowered.com/app/... или roblox.com/games/...">
      <div class="hint"><b>Steam:</b> store.steampowered.com/app/730/Counter-Strike-2/ &nbsp;·&nbsp; <b>Roblox:</b> roblox.com/games/2753915549/Blox-Fruits</div>
      <div class="msg" id="addMsg"></div>
      <button class="btn-primary" id="addBtn" style="margin-top:14px;">Добавить от имени сайта</button>
    </div>

    <div class="card">
      <h2>Отслеживаемые игры</h2>
      <div class="toolbar">
        <input type="text" id="filterInput" placeholder="Фильтр по названию…">
        <button class="btn-ghost" id="reloadBtn">Обновить</button>
        <span class="mono" id="countLabel" style="color:var(--text-dim);font-size:12px;"></span>
      </div>
      <div id="gamesList"><div class="empty">Загрузка…</div></div>
    </div>
  </div>

<script>
const API_BASE = location.origin;           // админка отдаётся тем же backend
const PW_KEY = 'tracker_admin_pw';
let allGames = [];

function getPw(){ return sessionStorage.getItem(PW_KEY) || ''; }
function authHeaders(extra){ return Object.assign({'X-Admin-Password': getPw()}, extra||{}); }
function fmt(n){ return (n===null||n===undefined) ? '—' : Math.round(n).toLocaleString('ru-RU'); }

async function apiCheck(pw){
  try{
    const r = await fetch(`${API_BASE}/api/admin/check`, {headers:{'X-Admin-Password':pw}});
    return r.ok;
  }catch(e){ return false; }
}

function showPanel(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('panel').style.display='block';
  document.getElementById('logoutBtn').style.display='inline-block';
  loadGames();
}
function showLogin(msg){
  document.getElementById('loginWrap').style.display='block';
  document.getElementById('panel').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
  if(msg){ const m=document.getElementById('loginMsg'); m.textContent=msg; m.className='msg error'; }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const pw = document.getElementById('pwInput').value;
  const msg = document.getElementById('loginMsg');
  if(!pw){ msg.textContent='Введи пароль'; msg.className='msg error'; return; }
  msg.textContent='Проверяем…'; msg.className='msg';
  if(await apiCheck(pw)){
    sessionStorage.setItem(PW_KEY, pw);
    showPanel();
  }else{
    msg.textContent='Неверный пароль (или ADMIN_PASSWORD не задан на сервере).';
    msg.className='msg error';
  }
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem(PW_KEY); showLogin();
});

/* добавление игры */
document.getElementById('addBtn').addEventListener('click', addGame);
document.getElementById('addInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addGame(); });
async function addGame(){
  const input = document.getElementById('addInput');
  const msg = document.getElementById('addMsg');
  const btn = document.getElementById('addBtn');
  const url = input.value.trim();
  if(!url){ msg.textContent='Вставь ссылку'; msg.className='msg error'; return; }
  btn.disabled=true; msg.textContent='Проверяем через API…'; msg.className='msg';
  try{
    const r = await fetch(`${API_BASE}/api/admin/add`, {
      method:'POST', headers:authHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({url}),
    });
    const data = await r.json();
    btn.disabled=false;
    if(!r.ok){ msg.textContent=data.detail||'Не удалось добавить'; msg.className='msg error'; return; }
    msg.textContent=`Добавлено: ${data.name} (${fmt(data.current)} онлайн)`; msg.className='msg success';
    input.value='';
    loadGames();
  }catch(e){ btn.disabled=false; msg.textContent='Ошибка сети'; msg.className='msg error'; }
}

/* список игр */
document.getElementById('reloadBtn').addEventListener('click', loadGames);
document.getElementById('filterInput').addEventListener('input', renderGames);
async function loadGames(){
  try{
    const r = await fetch(`${API_BASE}/api/top?source=all&limit=1000`);
    allGames = r.ok ? await r.json() : [];
  }catch(e){ allGames = []; }
  renderGames();
}

function renderGames(){
  const q = document.getElementById('filterInput').value.trim().toLowerCase();
  let rows = allGames.slice().sort((a,b)=>b.current-a.current);
  if(q) rows = rows.filter(g=>g.name.toLowerCase().includes(q));
  document.getElementById('countLabel').textContent = `${rows.length} из ${allGames.length}`;
  const el = document.getElementById('gamesList');
  if(!rows.length){ el.innerHTML = `<div class="empty">${allGames.length?'Ничего не найдено':'Пока нет игр'}</div>`; return; }
  el.innerHTML = rows.map(g=>{
    const src = (g.source||'').toLowerCase();
    const letter = (g.name||'?').charAt(0).toUpperCase();
    const img = g.image ? `<img src="${g.image}" onerror="this.style.display='none'">` : letter;
    const tag = g.added_by==='user' ? `<span class="tag user">игрок</span>` : `<span class="tag">сайт</span>`;
    return `<div class="row" data-source="${g.source}" data-id="${g.id}">
      <div class="thumb">${img}</div>
      <div><div class="nm">${g.name}</div><div class="src ${src}">${g.source}</div></div>
      <div class="num">${fmt(g.current)}</div>
      <div>${tag}</div>
      <div style="text-align:right;"><button class="btn-danger" data-del>Удалить</button></div>
    </div>`;
  }).join('');
}

document.getElementById('gamesList').addEventListener('click', async e=>{
  const btn = e.target.closest('[data-del]'); if(!btn) return;
  const row = btn.closest('.row');
  const source = row.dataset.source, id = row.dataset.id;
  const name = row.querySelector('.nm').textContent;
  if(!confirm(`Удалить «${name}» из трекинга вместе со всей историей?`)) return;
  btn.disabled=true; btn.textContent='…';
  try{
    const r = await fetch(`${API_BASE}/api/admin/delete`, {
      method:'POST', headers:authHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({source, id}),
    });
    if(r.status===401){ showLogin('Сессия истекла, войди заново.'); return; }
    if(r.ok){ allGames = allGames.filter(g=>!(g.source===source && g.id===id)); renderGames(); }
    else { btn.disabled=false; btn.textContent='Удалить'; }
  }catch(e){ btn.disabled=false; btn.textContent='Удалить'; }
});

/* старт: если в сессии есть валидный пароль — сразу панель */
(async function init(){
  const pw = getPw();
  if(pw && await apiCheck(pw)) showPanel();
  else showLogin();
})();
</script>
</body>
</html>
